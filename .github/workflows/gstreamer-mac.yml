name: Build and Test GStreamer on macOS

# Trigger on pushes to tags (for release) or manually
on:
  push:
    branches:
      - duet-main
      - feature/UniversalTarget
concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest  # Use latest macOS runner (for Windows use 'windows-latest' and adapt steps)
    steps:
      - name: Checkout GStreamer source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Homebrew dependencies
        run: |
          brew install glib x264 libjpeg libpng

      - name: Install x86_64 Homebrew dependencies
        run: |
          # Ensure x86_64 architecture for Homebrew
          sudo softwareupdate --install-rosetta --agree-to-license || true
          # Check if x86_64 Homebrew exists, install if not
          if [ ! -d "/usr/local/Homebrew" ]; then
            /usr/bin/arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          /usr/bin/arch -x86_64 /usr/local/bin/brew update
          /usr/bin/arch -x86_64 /usr/local/bin/brew install git glib x264 libjpeg libpng flex

      - name: Setup Python 3
        uses: actions/setup-python@v3
        with:
          python-version: '3.x'

      - name: Install Meson and Ninja
        run: |
          python3 -m pip install --upgrade pip
          pip install meson ninja

      - name: Configure build with Meson (x86 build)
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
          PATH: /bin:/usr/bin:/usr/local/bin:/usr/local/opt/flex/bin:/usr/local/opt/glib/bin:$PATH
        run: |
            meson setup builddir-x86 \
            --cross-file mac_x86_64.txt \
            --prefix "$PWD/install-dir-x86" \
            -Dbase=enabled \
            -Dgood=enabled \
            -Dbad=enabled \
            -Dugly=enabled \
            -Dgpl=enabled \
            -Dintrospection=disabled \
            -Dpkgconfig.relocatable=true

      - name: Configure build with Meson (ARM build)
        run: |
            meson setup builddir-arm \
            --prefix "$PWD/install-dir-arm" \
            -Dbase=enabled \
            -Dgood=enabled \
            -Dbad=enabled \
            -Dugly=enabled \
            -Dgpl=enabled \
            -Dintrospection=disabled \
            -Dpkgconfig.relocatable=true

      - name: Build GStreamer with Ninja (x86 build)
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
          PATH: /bin:/usr/bin:/usr/local/bin:/usr/local/opt/flex/bin:/usr/local/opt/glib/bin:$PATH
        run: meson compile -C builddir-x86

      - name: Build GStreamer with Ninja (arm build)
        run: meson compile -C builddir-arm

      - name: Install GStreamer to prefix (x86 build)
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
          PATH: /bin:/usr/bin:/usr/local/bin:/usr/local/opt/flex/bin:/usr/local/opt/glib/bin:$PATH
        run: meson install -C builddir-x86
      
      - name: Install GStreamer to prefix (arm build)
        run: meson install -C builddir-arm

      - name: Verify installation and plugins (x86 build)
        continue-on-error: true
        env:
          PATH: "$PWD/install-dir-x86/bin:${PATH}"
        run: |
          echo "GStreamer Version:"
          gst-inspect-1.0 --version

          echo "Core Plugins:"
          gst-inspect-1.0 fakesrc || true

          echo "H.264 Software Encoder (x264enc):"
          gst-inspect-1.0 x264enc || true

          echo "H.264 Hardware Encoder (VideoToolbox):"
          gst-inspect-1.0 vtenc_h264 || true

          echo "VideoToolbox Decoder (vtdec):"
          gst-inspect-1.0 vtdec || true

      - name: Verify installation and plugins (arm build)
        continue-on-error: true
        env:
          PATH: "$PWD/install-dir-arm/bin:${PATH}"
        run: |
          echo "GStreamer Version:"
          gst-inspect-1.0 --version

          echo "Core Plugins:"
          gst-inspect-1.0 fakesrc || true

          echo "H.264 Software Encoder (x264enc):"
          gst-inspect-1.0 x264enc || true

          echo "H.264 Hardware Encoder (VideoToolbox):"
          gst-inspect-1.0 vtenc_h264 || true

          echo "VideoToolbox Decoder (vtdec):"
          gst-inspect-1.0 vtdec || true

      - name: Package build artifacts x86
        run: | 
          cd install-dir-x86
          zip -r ../gstreamer-macos-x86.zip .

      - name: Package build artifacts arm
        run: | 
          cd install-dir-arm
          zip -r ../gstreamer-macos-arm.zip .

      - name: Upload install directory artifact for x86
        uses: actions/upload-artifact@v4
        with:
          name: GStreamer-install-dir-x86
          path: install-dir-x86

      - name: Upload install directory artifact for arm
        uses: actions/upload-artifact@v4
        with:
          name: GStreamer-install-dir-arm
          path: install-dir-arm

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: gstreamer-macos-x86.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: gstreamer-macos-arm.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
