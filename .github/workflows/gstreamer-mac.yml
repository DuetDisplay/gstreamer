name: Build and Test GStreamer on macOS

# Trigger on pushes to tags (for release) or manually
on:
  push:
    branches:
      - duet-main
      - feature/UniversalTarget
concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest  # Use latest macOS runner (for Windows use 'windows-latest' and adapt steps)
    steps:
      - name: Checkout GStreamer source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Homebrew dependencies
        run: |
          brew install git x264 libjpeg libpng flex glib gettext pcre2 libxml2

      - name: Install x86_64 Homebrew dependencies
        run: |
          # Ensure x86_64 architecture for Homebrew
          sudo softwareupdate --install-rosetta --agree-to-license || true
          # Check if x86_64 Homebrew exists, install if not
          if [ ! -d "/usr/local/Homebrew" ]; then
            /usr/bin/arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          /usr/bin/arch -x86_64 /usr/local/bin/brew update
          /usr/bin/arch -x86_64 /usr/local/bin/brew install git x264 libjpeg libpng flex glib gettext pcre2 libxml2

      - name: Setup Python 3
        uses: actions/setup-python@v3
        with:
          python-version: '3.x'

      - name: Install Meson and Ninja
        run: |
          python3 -m pip install --upgrade pip
          pip install meson ninja

      - name: Configure build with Meson (x86 build)
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
          PATH: /bin:/usr/bin:/usr/local/bin:/usr/local/opt/flex/bin:$PATH
        run: |
            meson setup builddir-x86 \
            --cross-file mac_x86_64.txt \
            --prefix "$PWD/install-dir-x86" \
            -Dbase=enabled \
            -Dgood=enabled \
            -Dbad=enabled \
            -Dugly=enabled \
            -Dgpl=enabled \
            -Dintrospection=disabled \
            -Dpkgconfig.relocatable=true

      - name: Configure build with Meson (ARM build)
        env:
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig:$PKG_CONFIG_PATH
          PATH: /bin:/usr/bin:/opt/homebrew/bin:/opt/homebrew/opt/flex/bin:$PATH
        run: |
            meson setup builddir-arm \
            --prefix "$PWD/install-dir-arm" \
            -Dbase=enabled \
            -Dgood=enabled \
            -Dbad=enabled \
            -Dugly=enabled \
            -Dgpl=enabled \
            -Dintrospection=disabled \
            -Dpkgconfig.relocatable=true

      - name: Build GStreamer with Ninja (x86 build)
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
          PATH: /bin:/usr/bin:/usr/local/bin:/usr/local/opt/flex/bin:$PATH
        run: meson compile -C builddir-x86

      - name: Build GStreamer with Ninja (arm build)
        env:
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig:$PKG_CONFIG_PATH
          PATH: /bin:/usr/bin:/opt/homebrew/bin:/opt/homebrew/opt/flex/bin:$PATH
        run: meson compile -C builddir-arm

      - name: Install GStreamer to prefix (x86 build)
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
          PATH: /bin:/usr/bin:/usr/local/bin:/usr/local/opt/flex/bin:$PATH
        run: meson install -C builddir-x86
      
      - name: Install GStreamer to prefix (arm build)
        env:
          PKG_CONFIG_PATH: /opt/homebrew/lib/pkgconfig:$PKG_CONFIG_PATH
          PATH: /bin:/usr/bin:/opt/homebrew/bin:/opt/homebrew/opt/flex/bin:$PATH
        run: meson install -C builddir-arm

      - name: Verify installation and plugins (x86 build)
        continue-on-error: true
        env:
          PATH: "$PWD/install-dir-x86/bin:${PATH}"
        run: |
          echo "GStreamer Version:"
          gst-inspect-1.0 --version

          echo "Core Plugins:"
          gst-inspect-1.0 fakesrc || true

          echo "H.264 Software Encoder (x264enc):"
          gst-inspect-1.0 x264enc || true

          echo "H.264 Hardware Encoder (VideoToolbox):"
          gst-inspect-1.0 vtenc_h264 || true

          echo "VideoToolbox Decoder (vtdec):"
          gst-inspect-1.0 vtdec || true

      - name: Verify installation and plugins (arm build)
        continue-on-error: true
        env:
          PATH: "$PWD/install-dir-arm/bin:${PATH}"
        run: |
          echo "GStreamer Version:"
          gst-inspect-1.0 --version

          echo "Core Plugins:"
          gst-inspect-1.0 fakesrc || true

          echo "H.264 Software Encoder (x264enc):"
          gst-inspect-1.0 x264enc || true

          echo "H.264 Hardware Encoder (VideoToolbox):"
          gst-inspect-1.0 vtenc_h264 || true

          echo "VideoToolbox Decoder (vtdec):"
          gst-inspect-1.0 vtdec || true

      - name: Package build artifacts x86
        run: | 
          cd install-dir-x86
          zip -r ../gstreamer-macos-x86.zip .

      - name: Package build artifacts arm
        run: | 
          cd install-dir-arm
          zip -r ../gstreamer-macos-arm.zip .

      - name: Upload install directory artifact for x86
        uses: actions/upload-artifact@v4
        with:
          name: GStreamer-install-dir-x86
          path: install-dir-x86

      - name: Upload install directory artifact for arm
        uses: actions/upload-artifact@v4
        with:
          name: GStreamer-install-dir-arm
          path: install-dir-arm

      - name: Create Universal Binary
        run: |
          # Define architecture-specific directories
          ARM_DIR="install-dir-arm"
          X86_DIR="install-dir-x86"
          UNIVERSAL_DIR="install-dir-universal"

          # Create the universal directory structure
          echo "Creating universal directory structure..."
          rsync -avh "$ARM_DIR/" "$UNIVERSAL_DIR/"

          # Merge non-binary files
          echo "Merging non-binary files..."
          rsync -avh --ignore-existing "$X86_DIR/" "$UNIVERSAL_DIR/"

          # Find and attempt to merge all files
          echo "Finding and merging all files..."
          find "$ARM_DIR" -type f | while read -r ARM_FILE; do
              # Determine the relative path
              REL_PATH="${ARM_FILE#$ARM_DIR/}"
              X86_FILE="$X86_DIR/$REL_PATH"
              UNIVERSAL_FILE="$UNIVERSAL_DIR/$REL_PATH"

              # Check if the corresponding x86 file exists
              if [ -f "$X86_FILE" ]; then
                  echo "Attempting to merge: $ARM_FILE and $X86_FILE"

                  # Create a temporary output file to avoid overwriting issues
                  TEMP_UNIVERSAL_FILE="${UNIVERSAL_FILE}.tmp"

                  # Attempt to create the universal binary
                  if lipo -create "$ARM_FILE" "$X86_FILE" -output "$TEMP_UNIVERSAL_FILE"; then
                      mv "$TEMP_UNIVERSAL_FILE" "$UNIVERSAL_FILE"
                      echo "Created universal binary: $UNIVERSAL_FILE"
                  else
                      echo "Skipping non-binary or incompatible file: $REL_PATH"
                      rm -f "$TEMP_UNIVERSAL_FILE"
                  fi
              fi
          done

          echo "Universal binary creation complete."
        shell: bash

      - name: Create Universal GLib and Intl Libraries
        run: |
          set -euo pipefail
      
          # Define Cellar roots
          ARM_CELLAR="/opt/homebrew/Cellar"
          X86_CELLAR="/usr/local/Cellar"
          UNIVERSAL_LIB_DIR="install-dir-universal/lib"
      
          mkdir -p "$UNIVERSAL_LIB_DIR"
      
          # List of libraries to merge
          LIBS=("libgirepository-2.0.0.dylib" "libgio-2.0.0.dylib" "libpixman-1.0.dylib" "libpsl.5.dylib" "libfreetype.6.dylib" "libpng16.16.dylib" "libx264.164.dylib" "libcairo-fdr.dylib" "libcairo-trace.dylib" "libcairo-script-interpreter.2.dylib" "libcairo-gobject.2.dylib" "libcairo.2.dylib" "libjpeg.8.3.2.dylib" "libturbojpeg.0.4.0.dylib" "libxml2.2.dylib" "libharfbuzz-gobject.0.dylib" "libharfbuzz.0.dylib" "libharfbuzz-subset.0.dylib" "libgthread-2.0.0.dylib" "libpcre2-8.0.dylib" "libglib-2.0.0.dylib" "libintl.8.dylib" "libgobject-2.0.0.dylib" "libgmodule-2.0.0.dylib")
      
          find_lib_path() {
            local base="$1"
            local libname="$2"
            find "$base" -type f -name "$libname" | sort | tail -n1
          }
      
          for lib in "${LIBS[@]}"; do
            ARM_FILE=$(find_lib_path "$ARM_CELLAR" "$lib" || true)
            X86_FILE=$(find_lib_path "$X86_CELLAR" "$lib" || true)
      
            if [[ -z "$ARM_FILE" || ! -f "$ARM_FILE" ]]; then
              echo "❌ ARM file not found for $lib"
              exit 1
            fi
      
            if [[ -z "$X86_FILE" || ! -f "$X86_FILE" ]]; then
              echo "❌ x86 file not found for $lib"
              exit 1
            fi
      
            echo "✅ Creating universal binary for $lib"
            lipo -create -output "$UNIVERSAL_LIB_DIR/$lib" "$ARM_FILE" "$X86_FILE"
      
            if [[ "$lib" == "libintl.8.dylib" ]]; then
              cp -f "$UNIVERSAL_LIB_DIR/$lib" "$UNIVERSAL_LIB_DIR/libintl.dylib"
            fi
          done
        shell: bash

      - name: Check for non-universal .dylib files
        continue-on-error: true
        run: |
          echo "Scanning for non-universal .dylib files in ./install-dir-universal directory..."
          non_universal_files=$(find ./install-dir-universal -type f -name "*.dylib" -exec sh -c '
            for file do
              archs=$(lipo -archs "$file" 2>/dev/null)
              if [ "$archs" != "x86_64 arm64" ]; then
                echo "$file"
              fi
            done
          ' sh {} +)
      
          if [ -n "$non_universal_files" ]; then
            echo "❌ The following .dylib files are not universal binaries:"
            echo "$non_universal_files"
            exit 1
          else
            echo "✅ All .dylib files are universal binaries."
          fi
      
      - name: Package build artifacts universal
        run: | 
          cd install-dir-universal
          zip -r ../gstreamer-macos-universal.zip .

      - name: Upload install directory artifact for universal
        uses: actions/upload-artifact@v4
        with:
          name: GStreamer-install-dir-universal
          path: install-dir-Universal

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: gstreamer-macos-x86.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: gstreamer-macos-arm.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: gstreamer-macos-universal.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
