name: Build and Test GStreamer on macOS

# Trigger on pushes to tags (for release) or manually
on:
  push:
    branches:
      - duet-main
      - feature/UniversalTarget
concurrency:
  group: ${{ github.workflow_ref }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: macos-latest  # Use latest macOS runner (for Windows use 'windows-latest' and adapt steps)
    steps:
      - name: Checkout GStreamer source
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install Homebrew dependencies
        run: |
          brew install glib x264 libjpeg libpng

      - name: Install x86_64 Homebrew dependencies
        run: |
          # Ensure x86_64 architecture for Homebrew
          sudo softwareupdate --install-rosetta --agree-to-license || true
          # Check if x86_64 Homebrew exists, install if not
          if [ ! -d "/usr/local/Homebrew" ]; then
            /usr/bin/arch -x86_64 /bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"
          fi
          /usr/bin/arch -x86_64 /usr/local/bin/brew update
          /usr/bin/arch -x86_64 /usr/local/bin/brew install git glib x264 libjpeg libpng flex

      - name: Setup Python 3
        uses: actions/setup-python@v3
        with:
          python-version: '3.x'

      - name: Install Meson and Ninja
        run: |
          python3 -m pip install --upgrade pip
          pip install meson ninja

      - name: Configure build with Meson (x86 build)
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
          PATH: /usr/local/bin:/usr/local/bin/flex:/usr/local/bin/glib:/usr/local/bin/x264:/usr/local/bin/libjpeg:/usr/local/bin/libpng:$PATH
        run: |
            meson setup builddir \
            --cross-file mac_x86_64.txt \
            --prefix "$PWD/install-dir" \
            -Dbase=enabled \
            -Dgood=enabled \
            -Dbad=enabled \
            -Dugly=enabled \
            -Dgpl=enabled \
            -Dintrospection=disabled \
            -Dpkgconfig.relocatable=true

      - name: Build GStreamer with Ninja
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig:$PKG_CONFIG_PATH
          PATH: /usr/local/bin:/usr/local/bin/flex:/usr/local/bin/glib:/usr/local/bin/x264:/usr/local/bin/libjpeg:/usr/local/bin/libpng:$PATH
        run: meson compile -C builddir
        # Compile the code with Ninja (Meson's backend). This builds GStreamer core and all specified plugins.

      - name: Install GStreamer to prefix
        env:
          PKG_CONFIG_PATH: /usr/local/lib/pkgconfig
          PATH: /usr/local/bin:$PATH
        run: meson install -C builddir
        # Install the built files into the specified prefix (install-dir). This will contain bin/, lib/, etc., for the built GStreamer.

      - name: Verify installation and plugins
        continue-on-error: true
        env:
          PATH: "$PWD/install-dir/bin:${PATH}"
        run: |
          echo "GStreamer Version:"
          gst-inspect-1.0 --version

          echo "Core Plugins:"
          gst-inspect-1.0 fakesrc || true

          echo "H.264 Software Encoder (x264enc):"
          gst-inspect-1.0 x264enc || true

          echo "H.264 Hardware Encoder (VideoToolbox):"
          gst-inspect-1.0 vtenc_h264 || true

          echo "VideoToolbox Decoder (vtdec):"
          gst-inspect-1.0 vtdec || true

      - name: Package build artifacts
        run: | 
          cd install-dir
          zip -r ../gstreamer-macos-universal.zip .

      - name: Upload install directory artifact
        uses: actions/upload-artifact@v4
        with:
          name: GStreamer-install-dir
          path: install-dir
        # Upload the raw install directory as an artifact (for examination or reuse). 

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          files: gstreamer-macos-universal.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
