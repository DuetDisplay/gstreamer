name: Build and Test GStreamer with Ugly and Bad Plugins (MSVC)

on:
  push:
    branches:
      - duet-main

jobs:
  build-and-test-windows-msvc:
    runs-on: windows-latest
    steps:
      # Checkout GStreamer source
      - name: Checkout GStreamer
        uses: actions/checkout@v4
        with:
          repository: GStreamer/gstreamer
          submodules: recursive
          path: gstreamer
      
      - name: Set Up Visual Studio Environment
        uses: microsoft/setup-msbuild@v1.1
        with:
          vs-version: '16.0'

      - name: Set Up Perl
        uses: shogo82148/actions-setup-perl@v1
        with:
          perl-version: '5.32'

      - name: Install NASM
        uses: ilammy/setup-nasm@v1

      - name: Download OpenSSL Source
        run: |
          Invoke-WebRequest -Uri https://www.openssl.org/source/openssl-1.1.1l.tar.gz -OutFile openssl-1.1.1l.tar.gz
          tar -xzf openssl-1.1.1l.tar.gz

      - name: Configure OpenSSL
        run: |
          cd openssl-1.1.1l
          perl Configure VC-WIN64A --prefix=${{ github.workspace }}\openssl-output

      - name: Build OpenSSL
        run: |
          cd openssl-1.1.1l
          nmake

      - name: Install OpenSSL
        run: |
          cd openssl-1.1.1l
          nmake install

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Install Meson and Ninja
      - name: Install Build Tools
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install meson ninja

      - name: Setup MSVC with Windows SDK
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64
          sdk: 10.0.22621.0  # For DirectX support

      # Set up MSVC environment (Visual Studio 2022)
      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64 # 64-bit build

      - name: Install NuGet CLI
        run: choco install nuget.commandline
  
      - name: Install oneVPL SDK
        run: nuget install onevpl.devel.win-x64

      # Configure Meson build
      - name: Configure Meson
        shell: powershell
        env:
          PKG_CONFIG_PATH: ${{ github.workspace }}\onevpl.devel.win-x64.2023.1.0.43419\lib\native\win-x64\pkgconfig;C:\hostedtoolcache\windows\Python\3.13.2\x64\lib\pkgconfig
        run: |
          Set-Location gstreamer
          pkg-config --modversion vpl
          meson setup builddir `
            -Dbase=enabled `
            -Dgood=enabled `
            -Dugly=enabled `
            -Dbad=enabled `
            -Dbad:directx=enabled `
            -Dgpl=enabled `
            -Dgst-plugins-bad:msdk=enabled `
            -Dgst-plugins-bad:nvcodec=enabled `
            -Dpython=disabled `
            -Ddevtools=disabled `
            -Ddoc=disabled `
            -Dexamples=disabled `
            --backend=ninja `
            --buildtype=release `
            -Dauto_features=auto `
            -Dtests=enabled `
            --prefix="$PWD/install-dir"

      # Build GStreamer
      - name: Build GStreamer
        shell: powershell
        run: |
          Set-Location gstreamer
          ninja -C builddir
      - name: Install GStreamer
        shell: powershell
        run: |
          Set-Location gstreamer
          ninja -C builddir install
          if ($LASTEXITCODE -ne 0) { throw "Install failed with exit code $LASTEXITCODE" }
      - name: Copy DLL Files to install-dir
        shell: pwsh
        run: |
          # Ensure the destination directory exists
          $destination = "install-dir/bin/"
          if (-Not (Test-Path -Path $destination)) {
            New-Item -ItemType Directory -Path $destination
          }
          # Copy all DLL files from the source directory to the destination
          Copy-Item -Path "${{ github.workspace }}/openssl-output/bin/libcrypto-1_1-x64.dll" -Destination $destination -Force

      # Verify installed tools
      - name: Verify Install
        shell: powershell
        run: |
          Set-Location gstreamer
          $gstInspect = Resolve-Path "install-dir/bin/gst-inspect-1.0.exe"
          & $gstInspect --version
          & $gstInspect dx9screencapsrc
          & $gstInspect videoconvert
          & $gstInspect x264enc
          & $gstInspect mp4mux
          & $gstInspect filesink

        # Debug: List install-dir contents
      - name: List Install Directory Contents
        shell: powershell
        run: |
          Set-Location gstreamer
          if (Test-Path "install-dir") {
            Get-ChildItem "install-dir" -Recurse | ForEach-Object { $_.FullName }
          } else {
            Write-Error "install-dir not found!"
          }

        # Upload installed files as artifact
      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gstreamer-windows-msvc
          path: gstreamer/install-dir/

      - 
        name: Package into ZIP
        shell: pwsh
        run: |
          Compress-Archive -Path gstreamer/install-dir/* -DestinationPath gstreamer-windows-msvc.zip

      - name: Upload Release ZIP
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ github.ref_name }}
          files: gstreamer/install-dir/gstreamer-windows-msvc.zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
