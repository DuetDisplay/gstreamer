name: Build and Test GStreamer with Ugly and Bad Plugins (MSVC)

on:
  push:
    branches:
      - duet-main

jobs:
  build-and-test-windows-msvc:
    runs-on: windows-latest
    steps:
      # Checkout GStreamer source
      - name: Checkout GStreamer
        uses: actions/checkout@v4
        with:
          repository: GStreamer/gstreamer
          submodules: recursive
          path: gstreamer

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Install Meson and Ninja
      - name: Install Build Tools
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install meson ninja

      - name: Setup MSVC with Windows SDK
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64
          sdk: 10.0.22621.0  # For DirectX support

      # Set up MSVC environment (Visual Studio 2022)
      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64 # 64-bit build

      # Configure Meson build
      - name: Configure Meson
        shell: powershell
        run: |
          Set-Location gstreamer
          meson setup builddir `
            -Dbase=enabled `
            -Dgood=enabled `
            -Dugly=enabled `
            -Dbad=enabled `
            -Dbad:directx=enabled `
            -Dpython=disabled `
            -Ddevtools=disabled `
            -Ddoc=disabled `
            -Dexamples=disabled `
            --backend=ninja `
            --buildtype=release `
            -Dauto_features=auto `
            -Dtests=enabled `
            --prefix="$PWD/install-dir"

      # Build GStreamer
      - name: Build GStreamer
        shell: powershell
        run: |
          Set-Location gstreamer
          ninja -C builddir
      - name: Install GStreamer
        shell: powershell
        run: |
          Set-Location gstreamer
          ninja -C builddir install
          if ($LASTEXITCODE -ne 0) { throw "Install failed with exit code $LASTEXITCODE" }

      # Verify installed tools
      - name: Verify Install
        shell: powershell
        run: |
          Set-Location gstreamer
          $gstInspect = Resolve-Path "install-dir/bin/gst-inspect-1.0.exe"
          & $gstInspect --version
          & $gstInspect dx9screencapsrc
          & $gstInspect videoconvert
          & $gstInspect x264enc
          & $gstInspect mp4mux
          & $gstInspect filesink

        # Run GStreamer tests (still from builddir)
    #   - name: Run Tests
    #     shell: powershell
    #     continue-on-error: true  # Pipeline continues even if tests fail
    #     run: |
    #       Set-Location gstreamer
    #       meson test -C builddir --print-errorlogs
    #     env:
    #       PATH: "${{ env.PATH }};C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\Enterprise\\VC\\Tools\\MSVC\\14.40.33807\\bin\\Hostx64\\x64"

        # Debug: List install-dir contents
      - name: List Install Directory Contents
        shell: powershell
        run: |
          Set-Location gstreamer
          if (Test-Path "install-dir") {
            Get-ChildItem "install-dir" -Recurse | ForEach-Object { $_.FullName }
          } else {
            Write-Error "install-dir not found!"
          }

        # Upload installed files as artifact
      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gstreamer-windows-msvc
          path: gstreamer/install-dir/
