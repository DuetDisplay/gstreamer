name: Build and Test GStreamer with Ugly and Bad Plugins (MSVC)

on:
  push:
    branches:
      - duet-main

jobs:
  build-and-test-windows-msvc:
    runs-on: windows-latest
    steps:
      # Checkout GStreamer source
      - name: Checkout GStreamer
        uses: actions/checkout@v4
        with:
          repository: GStreamer/gstreamer
          submodules: recursive
          path: gstreamer

      # Set up Python
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      # Install Meson and Ninja
      - name: Install Build Tools
        shell: powershell
        run: |
          python -m pip install --upgrade pip
          pip install meson ninja

      # Set up MSVC environment (Visual Studio 2022)
      - name: Setup MSVC Developer Command Prompt
        uses: ilammy/msvc-dev-cmd@v1
        with:
          arch: amd64 # 64-bit build

      # Configure Meson build
      - name: Configure Meson
        shell: powershell
        run: |
          Set-Location gstreamer
          meson setup builddir `
            -Dugly=enabled `
            -Dbad=enabled `
            -Dpython=disabled `
            -Ddevtools=disabled `
            -Ddoc=disabled `
            -Dexamples=disabled `
            --backend=ninja `
            --buildtype=release `
            -Dauto_features=auto `
            -Dtests=enabled

      # Build GStreamer
      - name: Build GStreamer
        shell: powershell
        run: |
          Set-Location gstreamer
          ninja -C builddir

      # Verify basic functionality
      - name: Verify Build
        shell: powershell
        run: |
          Set-Location gstreamer
          $gstInspect = Resolve-Path "builddir\gstreamer\tools\gst-inspect-1.0.exe"
          & $gstInspect --version

      # Run GStreamer tests
      - name: Run Tests
        shell: powershell
        run: |
          Set-Location gstreamer
          meson test -C builddir --print-errorlogs
        env:
          # Ensure MSVC tools are in PATH for tests
          PATH: "${{ env.PATH }};C:\\Program Files (x86)\\Microsoft Visual Studio\\2022\\Enterprise\\VC\\Tools\\MSVC\\14.40.33807\\bin\\Hostx64\\x64"

      # Upload build artifacts (even if tests fail)
      - name: Upload Build Artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: gstreamer-windows-msvc
          path: gstreamer/builddir/
